server:
  port: 8081
spring:
  application:
    name: barraca_lenia
  main:
    allowe-bean-definition-overriding: true
  datasource:
    url: jdbc:postgresql://localhost:5432/barraca_lenia
    username: postgres
    password: postgres
    driverClassName: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        order_updates: true
        order_inserts: true
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
